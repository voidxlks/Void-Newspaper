<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Page</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: monospace;
}

/* Characters and containers */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.character {
    width: 250px;
    height: 350px;
    background: radial-gradient(circle at center, #000 40%, #111 60%, #000 100%);
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
    transition: all 1s ease-in-out;
}

.arnald { background: red; }
.david { background: cyan; }

.ghost {
    position: absolute;
    bottom: 50px;
    left: 800px;
    width: 50px;
    height: 100px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    opacity: 0;
    transition: all 1s linear;
}

.typhoon-entity {
    position: absolute;
    top: -300px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #000 0%, #111 100%);
    border-radius: 50%;
    opacity: 0;
    box-shadow: 0 0 100px rgba(0,0,0,0.8);
    transition: all 1s ease-in-out;
}

/* Dialogue box */
.dialogue-box {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 18px;
}

.name { font-weight: bold; margin-bottom: 10px; }
.name.arnald { color: red; }
.name.david { color: cyan; }
.hint {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="container" id="sceneContainer">
    <div class="character" id="mysteryMan"></div>
</div>

<div class="hint">Click to continue...</div>

<div class="dialogue-box">
    <div class="name" id="speakerName">???</div>
    <div class="text" id="dialogueText">...</div>
</div>

<script>
// === ??? dialogue ===
const mysteryDialogue = [
    "You actually made it here...",
    "Not many people find this page.",
    "They think I disappeared.",
    "But I didn’t vanish...",
    "I was moved.",
    "Hidden between links… inside systems… inside pages like this.",
    "The Link Blade wasn’t made to guide you.",
    "It was made to choose who gets through.",
    "And now you're here.",
    "So tell me...",
    "Did you find this page...",
    "or did it let you in?"
];

let index = 0;

function speak(text, deep=false) {
    let speech = new SpeechSynthesisUtterance(text);
    let voices = speechSynthesis.getVoices();
    let chosenVoice = voices.find(v => v.name.toLowerCase().includes("david") || v.name.toLowerCase().includes("male"));
    if (chosenVoice) speech.voice = chosenVoice;
    speech.pitch = deep ? 0.5 : 0.7;
    speech.rate = deep ? 0.8 : 0.9;
    speechSynthesis.speak(speech);
}

function nextMystery() {
    if (index < mysteryDialogue.length) {
        let text = mysteryDialogue[index];
        document.getElementById("dialogueText").textContent = text;
        speak(text);
        index++;
    } else {
        startEnding();
    }
}

document.body.addEventListener("click", nextMystery);

// === Ending sequence: Typhoon Blade flash & shadow ===
function startEnding() {
    document.body.removeEventListener("click", nextMystery);
    document.getElementById("mysteryMan").style.opacity = "0";
    document.getElementById("dialogueText").textContent = "...";
    setTimeout(() => showTyphoonBlade(), 2500);
}

function showTyphoonBlade() {
    let blade = document.createElement("div");
    blade.style.position = "absolute";
    blade.style.top = "50%";
    blade.style.left = "50%";
    blade.style.transform = "translate(-50%, -50%)";
    blade.style.fontSize = "50px";
    blade.style.color = "white";
    blade.style.fontFamily = "monospace";
    blade.textContent = "TYPHOON BLADE";

    document.body.appendChild(blade);
    setTimeout(() => { blade.remove(); showShadow(); }, 1500);
}

function showShadow() {
    let shadow = document.createElement("div");
    shadow.style.position = "absolute";
    shadow.style.top = "50%";
    shadow.style.left = "50%";
    shadow.style.transform = "translate(-50%, -50%)";
    shadow.style.width = "200px";
    shadow.style.height = "300px";
    shadow.style.background = "#050505";
    shadow.style.boxShadow = "0 0 50px rgba(255,0,0,0.2)";
    shadow.style.borderRadius = "10px";
    document.body.appendChild(shadow);

    setTimeout(() => { shadow.style.opacity = "0"; }, 2000);
    setTimeout(() => { shadow.remove(); showArnaldDavid(); }, 2500);
}

// === Arnald & David dialogue ===
function showArnaldDavid() {
    const container = document.getElementById("sceneContainer");
    const arnaldDiv = document.createElement("div");
    arnaldDiv.classList.add("character","arnald");
    container.appendChild(arnaldDiv);

    const conversation = [
        {name:"Arnald", text:"Finally... someone made it through."},
        {name:"David", text:"Who are you? What's happening here?"},
        {name:"Arnald", text:"I am Arnald. The Typhoon Blade is not just a symbol."},
        {name:"David", text:"A symbol of what? Why are we here?"},
        {name:"Arnald", text:"It is a warning. Many have tried, many failed."},
        {name:"David", text:"Then how do I survive this?"},
        {name:"Arnald", text:"Listen closely. Everything you see has meaning. Choose wisely."},
        {name:"David", text:"I understand... I will be careful."},
        {name:"Arnald", text:"Good. Now the real test begins."}
    ];

    let convIndex = 0;

    function nextLine() {
        if (convIndex < conversation.length) {
            let line = conversation[convIndex];
            const nameEl = document.getElementById("speakerName");
            nameEl.textContent = line.name;
            nameEl.className = "name " + line.name.toLowerCase();
            document.getElementById("dialogueText").textContent = line.text;
            speak(line.text, line.name==="Arnald");
            convIndex++;
        } else {
            document.getElementById("dialogueText").textContent = "...";
            document.body.removeEventListener("click", nextLine);
            startChaseScene();
        }
    }

    document.body.addEventListener("click", nextLine);
}

// === Chase Scene: ghost + Black Typhoon Entity ===
function startChaseScene() {
    const arnald = document.querySelector('.arnald');
    const david = document.createElement('div');
    david.classList.add('character','david');
    document.getElementById('sceneContainer').appendChild(david);
    const ghost = document.querySelector('.ghost');
    const typhoon = document.querySelector('.typhoon-entity');
    const dialogueBox = document.getElementById('dialogueText');
    dialogueBox.textContent = "David and Arnald are running...";

    let step = 0;
    const interval = setInterval(() => {
        step += 10;
        arnald.style.left = 200 + step + "px";
        david.style.left = 300 + step + "px";

        if(step === 200){
            dialogueBox.textContent = "A ghost appears!";
            ghost.style.opacity = 1;
            ghost.style.left = "550px";
        }
        if(step === 300){
            dialogueBox.textContent = "The ghost catches Arnald!";
            arnald.style.bottom = "150px"; // lift
        }
        if(step === 350){
            dialogueBox.textContent = "Arnald is thrown aside!";
            arnald.style.bottom = "50px";
            arnald.style.left = "600px";
        }
        if(step === 400){
            dialogueBox.textContent = "The Black Typhoon Entity emerges!";
            typhoon.style.opacity = 1;
            typhoon.style.top = "50px";
            clearInterval(interval);
        }
    }, 800);
}

speechSynthesis.onvoiceschanged = () => {};
</script>

<div class="ghost"></div>
<div class="typhoon-entity"></div>

</body>
</html>
