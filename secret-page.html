<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>???</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow: hidden;
}

/* Center image */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Fake missing man silhouette */
.missing-man {
    width: 250px;
    height: 350px;
    background: radial-gradient(circle at center, #000 40%, #111 60%, #000 100%);
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

/* Dialogue box */
.dialogue-box {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.9);
    padding: 20px;
    border-top: 1px solid #222;
}

.name {
    color: red;
    font-weight: bold;
    margin-bottom: 10px;
}

.text {
    font-size: 18px;
}

/* Click hint */
.hint {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <div class="missing-man"></div>
</div>

<div class="hint">Click to continue...</div>

<div class="dialogue-box">
    <div class="name">???</div>
    <div class="text" id="dialogueText">...</div>
</div>

<script>
const dialogue = [
    "You actually made it here...",
    "Not many people find this page.",
    "They think I disappeared.",
    "But I didn’t vanish...",
    "I was moved.",
    "Hidden between links… inside systems… inside pages like this.",
    "The Link Blade wasn’t made to guide you.",
    "It was made to choose who gets through.",
    "And now you're here.",
    "So tell me...",
    "Did you find this page...",
    "or did it let you in?"
];

let index = 0;

function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    
    // Try to force a deeper male voice
    let voices = speechSynthesis.getVoices();
    let maleVoice = voices.find(v => v.name.toLowerCase().includes("male") || v.name.toLowerCase().includes("david"));
    
    if (maleVoice) {
        speech.voice = maleVoice;
    }

    speech.pitch = 0.7;
    speech.rate = 0.9;

    speechSynthesis.speak(speech);
}

function nextDialogue() {
    if (index < dialogue.length) {
        let text = dialogue[index];
        document.getElementById("dialogueText").textContent = text;
        speak(text);
        index++;
    } else {
        document.getElementById("dialogueText").textContent = "...";
    }
}

document.body.addEventListener("click", nextDialogue);

// preload voices
speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
</html>
