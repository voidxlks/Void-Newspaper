<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>???</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow: hidden;
}

/* Centered missing man / shadow figure */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.missing-man, .arnald-man {
    width: 250px;
    height: 350px;
    background: radial-gradient(circle at center, #000 40%, #111 60%, #000 100%);
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
    transition: opacity 2s;
}

/* Dialogue box */
.dialogue-box {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.9);
    padding: 20px;
    border-top: 1px solid #222;
}

.name {
    color: red;
    font-weight: bold;
    margin-bottom: 10px;
}

.text {
    font-size: 18px;
}

/* Click hint */
.hint {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="container">
    <div class="missing-man" id="mysteryMan"></div>
</div>

<div class="hint">Click to continue...</div>

<div class="dialogue-box">
    <div class="name" id="speakerName">???</div>
    <div class="text" id="dialogueText">...</div>
</div>

<script>
const dialogue = [
    "You actually made it here...",
    "Not many people find this page.",
    "They think I disappeared.",
    "But I didn’t vanish...",
    "I was moved.",
    "Hidden between links… inside systems… inside pages like this.",
    "The Link Blade wasn’t made to guide you.",
    "It was made to choose who gets through.",
    "And now you're here.",
    "So tell me...",
    "Did you find this page...",
    "or did it let you in?"
];

let index = 0;

function speak(text, deep=false) {
    let speech = new SpeechSynthesisUtterance(text);
    let voices = speechSynthesis.getVoices();

    // Choose a male voice, prefer deep if Arnald
    let chosenVoice = voices.find(v => v.name.toLowerCase().includes("david") || v.name.toLowerCase().includes("male"));
    if (chosenVoice) speech.voice = chosenVoice;

    speech.pitch = deep ? 0.5 : 0.7;  // deeper for Arnald
    speech.rate = deep ? 0.8 : 0.9;
    speechSynthesis.speak(speech);
}

function nextDialogue() {
    if (index < dialogue.length) {
        let text = dialogue[index];
        document.getElementById("dialogueText").textContent = text;
        speak(text);
        index++;
    } else {
        startEnding();
    }
}

document.body.addEventListener("click", nextDialogue);

// ENDING SEQUENCE
function startEnding() {
    document.body.removeEventListener("click", nextDialogue);

    // Fade out ??? / missing man
    let mystery = document.getElementById("mysteryMan");
    mystery.style.opacity = "0";
    document.getElementById("dialogueText").textContent = "...";

    setTimeout(() => { showTyphoonBlade(); }, 2500);
}

// Typhoon Blade flash jump scare
function showTyphoonBlade() {
    let blade = document.createElement("div");
    blade.style.position = "absolute";
    blade.style.top = "50%";
    blade.style.left = "50%";
    blade.style.transform = "translate(-50%, -50%)";
    blade.style.fontSize = "50px";
    blade.style.color = "white";
    blade.style.fontFamily = "monospace";
    blade.textContent = "TYPHOON BLADE";

    document.body.appendChild(blade);

    setTimeout(() => { blade.remove(); showShadow(); }, 1500);
}

// Shadow figure appears briefly
function showShadow() {
    let shadow = document.createElement("div");
    shadow.style.position = "absolute";
    shadow.style.top = "50%";
    shadow.style.left = "50%";
    shadow.style.transform = "translate(-50%, -50%)";
    shadow.style.width = "200px";
    shadow.style.height = "300px";
    shadow.style.background = "#050505";
    shadow.style.boxShadow = "0 0 50px rgba(255,0,0,0.2)";
    shadow.style.borderRadius = "10px";

    document.body.appendChild(shadow);

    setTimeout(() => { shadow.style.opacity = "0"; }, 2000);

    setTimeout(() => {
        shadow.remove();
        showArnald();
    }, 2500);
}

// Arnald appears
function showArnald() {
    let container = document.querySelector(".container");
    let arnaldDiv = document.createElement("div");
    arnaldDiv.classList.add("arnald-man");
    container.appendChild(arnaldDiv);

    document.getElementById("speakerName").textContent = "Arnald";

    // Arnald dialogue lines
    const arnaldDialogue = [
        "Finally... someone made it through.",
        "I am Arnald.",
        "The Typhoon Blade is not just a symbol.",
        "It is a warning.",
        "Many have tried... many failed.",
        "But you are still here.",
        "Listen closely... everything you see has meaning.",
        "Choose wisely, or it may consume you too."
    ];

    let idx = 0;

    function nextArnaldLine() {
        if (idx < arnaldDialogue.length) {
            let text = arnaldDialogue[idx];
            document.getElementById("dialogueText").textContent = text;
            speak(text, true); // deep male voice
            idx++;
        } else {
            document.getElementById("dialogueText").textContent = "...";
        }
    }

    document.body.addEventListener("click", nextArnaldLine);
}

speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
</html>
