<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Gate</title>

<link rel="stylesheet" href="blog.css">

<style>
.center-box {
    max-width: 500px;
    margin: 100px auto;
    padding: 30px;
    background: #111;
    border: 1px solid #222;
    text-align: center;
}

input {
    padding: 10px;
    width: 80%;
    margin-top: 15px;
    background: black;
    border: 1px solid #333;
    color: white;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: black;
    color: white;
    border: 1px solid #333;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

#error {
    color: red;
    margin-top: 10px;
    display: none;
}

.success {
    color: lime;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<header>
    <h1 class="glitch">VOIDXLKS ACCESS</h1>
    <p>Restricted Entry • Authorized Users Only</p>
</header>

<div class="center-box">
    <h2>Enter the Link Blade Password</h2>

    <p>
        The secret man left this behind.<br>
        Only those who know the key may continue.
    </p>

    <input type="password" id="passwordInput" placeholder="Enter password...">
    <br>
    <button onclick="checkPassword()">Enter</button>

    <div id="error">ACCESS DENIED</div>
    <div class="success" id="success">ACCESS GRANTED</div>
</div>

<footer>
    <p>© VoidXLKS System</p>
</footer>

<script>
function checkPassword() {
    let password = document.getElementById("passwordInput").value;

    // CHANGE THIS PASSWORD
    let correctPassword = "typhoon";

    if (password === correctPassword) {
        document.getElementById("error").style.display = "none";
        document.getElementById("success").style.display = "block";

        setTimeout(() => {
            window.location.href = "secret.html"; // where it goes after success
        }, 1500);

    } else {
        document.getElementById("error").style.display = "block";
        document.getElementById("success").style.display = "none";
    }
}
</script>

</body>
</html>
